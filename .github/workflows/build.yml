name: Build OpenWrt for BPi-R4

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日国际标准时间 0:00（北京时间 8:00）运行一次
  workflow_dispatch: # 允许手动触发

env:
  REPO_URL: https://github.com/0x5826/openwrt-25.12
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: bpi-r4.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Builder Repo
      uses: actions/checkout@v4

    - name: Free Disk Space (Ubuntu)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/rust /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update
        sudo -E apt-get -y install build-essential clang flex bison g++ gawk gettext git libncurses5-dev libncurses-dev libssl-dev python3-distutils python3-pyelftools rsync unzip zlib1g-dev file wget libelf-dev bc time
        sudo -E apt-get clean

    - name: Clone OpenWrt Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: Download Package Sources
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the Firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
    - name: Organize Files
      run: |
        cd openwrt
        mkdir -p ${{ github.workspace }}/publish
        TARGET_DIR="bin/targets/mediatek/filogic"
        if [ -d "$TARGET_DIR" ]; then
          find "$TARGET_DIR" -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" \) -exec cp {} ${{ github.workspace }}/publish/ \;
        else
          echo "Directory $TARGET_DIR does not exist. Compilation might have failed."
          exit 1
        fi
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Upload Firmware Directory
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_BPi-R4_firmware_${{ env.FILE_DATE }}
        path: ${{ github.workspace }}/publish/*
